version: "3.8"

services:
  companion-api:
    build:
      context: ./companion-backend
    container_name: companion-api
    ports:
      - "8001:8001"
    env_file: ./companion-backend/.env
    restart: unless-stopped
    networks:
      - companion-net
    volumes:
      - ./companion-backend:/app
    depends_on: []

  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: companion-whisper
    ports:
      - "8000:8000"
    environment:
      - WHISPER__MODEL=base
      - WHISPER__LANGUAGE=en
    volumes:
      - whisper-models:/root/.cache/huggingface
    restart: unless-stopped
    networks:
      - companion-net

volumes:
  whisper-models:

networks:
  companion-net:
    external: true