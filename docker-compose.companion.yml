version: "3.8"

services:
  # PostgreSQL Database (NEW for this app)
  db:
    image: postgres:15
    container_name: companion-db
    environment:
      POSTGRES_DB: companion
      POSTGRES_USER: companion
      POSTGRES_PASSWORD: your_secure_password_here
    volumes:
      - companion-postgres:/var/lib/postgresql/data
    ports:
      - "5466:5432"
    networks:
      - companion-net
    restart: unless-stopped

  # Companion API (Backend)
  companion-api:
    build:
      context: ./companion-backend
    container_name: companion-api
    ports:
      - "5471:8001"
    env_file: ./companion-backend/.env
    networks:
      - companion-net
    volumes:
      - ./companion-backend:/app
    depends_on:
      - db
    restart: unless-stopped

  # Whisper (Speech to Text)
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: companion-whisper
    ports:
      - "6470:8000"
    environment:
      - WHISPER__MODEL=base
      - WHISPER__LANGUAGE=en
    volumes:
      - whisper-models:/root/.cache/huggingface
    networks:
      - companion-net
    restart: unless-stopped

volumes:
  whisper-models:
  companion-postgres:

networks:
  companion-net:
    external: true