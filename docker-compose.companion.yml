services:
  # PostgreSQL Database (NEW for this app)
  db:
    image: postgres:15
    container_name: companion-db
    environment:
      POSTGRES_DB: companion
      POSTGRES_USER: companion
      POSTGRES_PASSWORD: Love1stheDrug!
    volumes:
      - companion-postgres:/var/lib/postgresql/data
    ports:
      - "5466:5432"
    networks:
      - companion-net
    restart: unless-stopped

  # Companion API (Backend)
  companion-api:
    build:
      context: ./companion-backend
      dockerfile: Dockerfile
    container_name: companion-api
    ports:
      - "5471:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - companion-music:/app/music
    environment:
      - QDRANT_URL=http://173.249.40.161:5467
      - N8N_URL=https://n8n.zu-auto.co.uk
      - N8N_LEARNING_WEBHOOK_URL=https://n8n.zu-auto.co.uk/webhook/learning-loop
      - IMMICH_URL=http://173.249.40.161:2283
      - IMMICH_API_KEY=eeq1EQNyIWKSH03tAVV4ojPBp3hNcMQwI7NDgSwh1o
      - VIKUNJA_URL=https://vik.zu-auto.co.uk
      - VIKUNJA_API_KEY=tk_78320358404f85c3fe92b139dc307d04ba3de518
      - OPENROUTER_API_KEY=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
      -       DATABASE_URL=postgresql://companion:Love1stheDrug!@db:5432/companion
      - JWT_SECRET=zY8rJpQ4sVn2XcKfL1aW7eTgH5uBqD3mR6yN0oI8pCwSxE4FvUjZkG1hM2lA9t
      - CARER_USERNAME=carer
      -       CARER_PASSWORD=Love1stheDrug!
      - JOHN_LAT=53.8317
      - JOHN_LON=-2.2340
      - JOHN_USER_ID=1
      - WHISPER_URL=http://whisper:8000
    networks:
      - companion-net
    depends_on:
      - db
    restart: unless-stopped

  # Whisper (Speech to Text)
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: companion-whisper
    ports:
      - "6470:8000"
    environment:
      - WHISPER__MODEL=base
      - WHISPER__LANGUAGE=en
    volumes:
      - whisper-models:/root/.cache/huggingface
    networks:
      - companion-net
    restart: unless-stopped

  # Frontend Web UI
  frontend:
    image: nginx:alpine
    container_name: companion-frontend
    ports:
      - "5472:80"
    volumes:
      - ./companion-frontend/dist:/usr/share/nginx/html:ro
      - ./companion-frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - companion-net
    restart: unless-stopped

volumes:
  whisper-models:
  companion-postgres:
  companion-music:

networks:
  companion-net:
    driver: bridge